<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>QR Card - ContactKar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;}

/* THE CARD - printable A6 size */
.qr-card{
  width:420px;
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.15);
  display:flex;
  flex-direction:row;
}

/* LEFT panel - blue */
.card-left{
  background:#1e40af;
  flex:1.1;
  padding:1.4rem 1.2rem;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  color:#fff;
}
.brand-top{font-size:.75rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;opacity:.8;margin-bottom:.8rem;}
.main-text{font-size:1.45rem;font-weight:900;line-height:1.25;margin-bottom:auto;}
.main-text span{color:#93c5fd;}
.icons-row{display:flex;gap:.5rem;margin-top:1.2rem;flex-wrap:wrap;}
.icon-chip{background:rgba(255,255,255,.15);border-radius:8px;padding:.35rem .5rem;font-size:.62rem;font-weight:700;display:flex;align-items:center;gap:.28rem;color:#fff;}
.scan-hint{font-size:.62rem;opacity:.7;margin-top:.9rem;line-height:1.5;}

/* RIGHT panel - white with blue accent top */
.card-right{
  width:155px;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:.9rem .75rem 1rem;
  border-left:3px solid #1e40af;
}
.card-right-top{background:#1e40af;width:100%;margin:-0.9rem -.75rem 0;padding:.4rem .75rem;text-align:center;color:#fff;font-size:.62rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:.85rem;}
.qr-wrap{background:#fff;padding:6px;border:2px solid #1e40af;border-radius:8px;}
.qr-wrap img{width:118px;height:118px;display:block;}
.tag-code{font-size:.72rem;font-weight:900;color:#1e40af;margin-top:.6rem;letter-spacing:1px;}
.ck-brand{font-size:.58rem;font-weight:800;color:#9ca3af;margin-top:.35rem;text-transform:uppercase;letter-spacing:.5px;}

/* CONTROLS */
.controls{margin-top:1.4rem;display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;}
.btn{padding:.55rem 1.2rem;border-radius:9px;font-weight:700;font-size:.85rem;cursor:pointer;border:none;font-family:inherit;}
.btn-blue{background:#1e40af;color:#fff;}
.btn-blue:hover{background:#1d3a9e;}
.btn-gray{background:#fff;color:#374151;border:1.5px solid #d1d5db;}
.btn-gray:hover{background:#f9fafb;}

/* PRINT MODE */
@media print{
  body{background:#fff;padding:0;}
  .controls{display:none;}
  .qr-card{box-shadow:none;border:1px solid #e5e7eb;}
}
</style>
</head>
<body>

<div class="qr-card" id="qr-card">
  <div class="card-left">
    <div>
      <div class="brand-top">ContactKar</div>
      <div class="main-text">Scan to <span>contact</span> the vehicle owner.</div>
    </div>
    <div>
      <div class="icons-row">
        <div class="icon-chip">&#128683; Wrong Parking</div>
        <div class="icon-chip">&#128680; Emergency</div>
        <div class="icon-chip">&#128222; Call Owner</div>
      </div>
      <div class="scan-hint">Scan using Phone Camera,<br>Google Lens or any QR Scanner.</div>
    </div>
  </div>

  <div class="card-right">
    <div class="card-right-top">Scan QR</div>
    <div class="qr-wrap">
      <img id="qr-img" src="" alt="QR Code"/>
    </div>
    <div class="tag-code" id="tag-code-lbl">CAR-XXXXXX</div>
    <div class="ck-brand">contactkar.vercel.app</div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-blue" onclick="window.print()">&#128438; Print / Save PDF</button>
  <button class="btn btn-gray" onclick="downloadCard()">&#11015; Download Image</button>
  <button class="btn btn-gray" onclick="window.close()">&#10005; Close</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
var BASE = 'https://contactkar.onrender.com/api';

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

var code    = getParam('code')    || 'CAR-XXXXXX';
var tagType = getParam('type')    || 'vehicle';
var isPet   = tagType === 'pet';

// Update left panel text for pet tags
if (isPet) {
  document.querySelector('.main-text').innerHTML = 'Scan to <span>contact</span> the pet owner.';
  document.querySelector('.icons-row').innerHTML =
    '<div class="icon-chip">&#128054; Lost Pet</div>' +
    '<div class="icon-chip">&#128680; Emergency</div>' +
    '<div class="icon-chip">&#128222; Call Owner</div>';
}

// Set tag code label
document.getElementById('tag-code-lbl').textContent = code;

// Generate QR
var scanUrl = 'https://contactkar.vercel.app/scan/' + code;
var qrUrl   = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&ecc=H&margin=1&data=' + encodeURIComponent(scanUrl);
document.getElementById('qr-img').src = qrUrl;

function downloadCard() {
  html2canvas(document.getElementById('qr-card'), { scale: 3, useCORS: true, backgroundColor: '#fff' })
  .then(function (canvas) {
    var a = document.createElement('a');
    a.download = 'ContactKar-' + code + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}
</script>
</body>
</html>
